<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; }
        .login-container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; }
        .message { margin-top: 10px; text-align: center; font-size: 0.9em; }
        .error { color: red; }
        .success { color: green; }
        #dashboard { display: none; text-align: center; }
    </style>
</head>
<body>

    <!-- Форма входа -->
    <div class="login-container" id="loginForm">
        <h2 style="text-align: center;">Вход</h2>
        <input type="text" id="username" placeholder="Логин" required>
        <input type="password" id="password" placeholder="Пароль" required>
        <button onclick="login()" id="btnLogin">Войти</button>
        <div class="message" id="message"></div>
    </div>

    <!-- Панель управления (показывается после входа) -->
    <div class="login-container" id="dashboard">
        <h2>Добро пожаловать!</h2>
        <p>Вы вошли как: <span id="userDisplay"></span></p>
        <p>Роль: <span id="roleDisplay"></span></p>
        <button onclick="logout()">Выйти</button>
    </div>

    <script>
        // ВСТАВЬТЕ СЮДА ВАШ URL WEB APP ИЗ GOOGLE APPS SCRIPT
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyKJCKwghqQad9lWxJSr6lHoyYN_8uqg0fDy5wI3qiaywFm2948hxTXCZhLwCfZRRzY/exec';

        // Проверка, есть ли сохраненная сессия при загрузке
        window.onload = function() {
            const session = localStorage.getItem('authSession');
            if (session) {
                const data = JSON.parse(session);
                showDashboard(data);
            }
        };

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');
            const msgDiv = document.getElementById('message');

            if (!username || !password) {
                showMessage("Введите логин и пароль", "error");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Проверка...";
            showMessage("", "");

            try {
                // Используем fetch с mode: 'no-cors' нельзя для получения JSON ответа.
                // Google Apps Script поддерживает CORS, если правильно настроить ответ.
                // Мы отправляем POST запрос с JSON телом.
                
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ username: username, password: password })
                    // Важно: не устанавливайте Content-Type header вручную, 
                    // браузер сам поставит text/plain;charset=UTF-8 для простоты, 
                    // а GAS разберет тело через e.postData.contents
                });

                const result = await response.json();

                if (result.success) {
                    // Сохраняем сессию локально
                    const sessionData = {
                        username: username,
                        role: result.role,
                        token: result.token,
                        loginTime: new Date().toISOString()
                    };
                    localStorage.setItem('authSession', JSON.stringify(sessionData));
                    showDashboard(sessionData);
                } else {
                    showMessage(result.message, "error");
                }

            } catch (error) {
                console.error(error);
                showMessage("Ошибка соединения с сервером", "error");
            } finally {
                btn.disabled = false;
                btn.innerText = "Войти";
            }
        }

        function showDashboard(data) {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('userDisplay').innerText = data.username;
            document.getElementById('roleDisplay').innerText = data.role;
        }

        function logout() {
            localStorage.removeItem('authSession');
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            showMessage("", "");
        }

        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerText = text;
            msgDiv.className = "message " + type;
        }
    </script>
</body>
</html>
