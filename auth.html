<script>
    const GAS_URL = 'ВАШ_URL_СКРИПТА';

    window.addEventListener('load', () => {
        const session = localStorage.getItem('authSession');
        if (session) {
            const data = JSON.parse(session);
            checkSession(data.token);
        }
    });

    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        // Отправляем action: login
        const res = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "login", username, password })
        });
        const result = await res.json();

        if (result.success) {
            localStorage.setItem('authSession', JSON.stringify({
                token: result.token,
                role: result.role,
                username: username
            }));
            showDashboard(result);
        } else {
            alert(result.message);
        }
    }

    async function checkSession(token) {
        // Отправляем action: check
        const res = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "check", token: token })
        });
        const result = await res.json();

        if (result.success) {
            showDashboard(result);
        } else {
            logout(); // Если токен невалиден или истек
        }
    }

    function logout() {
        localStorage.removeItem('authSession');
        location.reload();
    }
    
    function showDashboard(data) {
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('dashboardView').classList.remove('hidden');
        document.getElementById('userDisplay').innerText = data.username || data.role;
    }
</script>
