<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .card { background: white; padding: 40px 30px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); text-align: center; max-width: 420px; width: 100%; }
    .hidden { display: none !important; }
    .error { color: #e74c3c; margin-top: 15px; min-height: 20px; }
    .success { color: #27ae60; font-weight: 600; margin: 10px 0; }
    #avatar { width: 90px; height: 90px; border-radius: 50%; margin: 15px auto; display: block; border: 3px solid #667eea; object-fit: cover; }
    #user-name { font-size: 18px; font-weight: 600; color: #333; margin: 5px 0; }
    #user-email { color: #666; font-size: 14px; margin-bottom: 20px; word-break: break-all; }
    button { background: #e74c3c; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; margin-top: 10px; }
    button:hover { background: #c0392b; }
    .loader { border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; width: 28px; height: 28px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <h2>🔐 Вход</h2>
  
  <div id="login-view">
    <div id="g_id_signin"></div>
    <div class="loader hidden" id="loader"></div>
    <div class="error" id="msg"></div>
  </div>
  
  <div id="success-view" class="hidden">
    <p class="success">✓ Доступ разрешён</p>
    <img id="avatar" src="" alt="Avatar">
    <div id="user-name"></div>
    <div id="user-email"></div>
    <button onclick="logout()">🚪 Выйти</button>
  </div>
</div>

<script>
  // 🔥 ВАША ССЫЛКА НА APPS SCRIPT (без пробелов!)
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz17gn2JxsR6IwPCKonUudB9FfrP5fllJms4k0myStaYfws4gB10UHyHSVJyug9HjmkTQ/exec';
  const REDIRECT_AFTER = 'https://fidan977.github.io/'; // Куда вернуться после успеха

  // 🔹 Проверка: вернулись ли мы после проверки токена
  const params = new URLSearchParams(location.search);
  if (params.get('status') === 'ok') {
    showSuccess({
      email: params.get('email'),
      name: params.get('name'),
      picture: params.get('picture')
    });
    history.replaceState(null, '', location.pathname); // Чистим URL
  } else if (params.get('error')) {
    document.getElementById('msg').textContent = '❌ ' + params.get('error');
    history.replaceState(null, '', location.pathname);
  } else {
    // Проверка сохранённой сессии
    const saved = localStorage.getItem('auth');
    if (saved) {
      try {
        const u = JSON.parse(saved);
        if (Date.now() - u.time < 24*60*60*1000) {
          showSuccess(u);
        }
      } catch(e) { localStorage.removeItem('auth'); }
    }
  }

  // 🔹 Обработчик: ПОЛУЧИЛИ ТОКЕН → СРАЗУ РЕДИРЕКТ НА СКРИПТ
  function handleCredential(response) {
    document.getElementById('loader').classList.remove('hidden');
    
    const token = response.credential;
    
    // 🔥 МГНОВЕННЫЙ РЕДИРЕКТ на скрипт с токеном в параметрах
    const target = SCRIPT_URL.trim() + 
      '?action=auth' +
      '&token=' + encodeURIComponent(token) +
      '&redirect=' + encodeURIComponent(REDIRECT_AFTER) +
      '&ts=' + Date.now(); // Чтобы избежать кэша
    
    console.log('🔄 Redirect to:', target);
    location.href = target; // Никаких fetch, только редирект!
  }

  function showSuccess(user) {
    document.getElementById('login-view').classList.add('hidden');
    document.getElementById('success-view').classList.remove('hidden');
    document.getElementById('user-name').textContent = user.name || user.email;
    document.getElementById('user-email').textContent = user.email;
    document.getElementById('avatar').src = user.picture || 'https://via.placeholder.com/90?text=👤';
    
    localStorage.setItem('auth', JSON.stringify({
      email: user.email, name: user.name, picture: user.picture, time: Date.now()
    }));
  }

  function logout() {
    localStorage.removeItem('auth');
    location.reload();
  }

  // 🔹 Инициализация
  window.onload = function() {
    if (!document.getElementById('success-view').classList.contains('hidden')) return;
    
    if (window.google?.accounts?.id) {
      google.accounts.id.initialize({
        client_id: "461200840639-bup0mjs0lji7cr1lbbd49poc2t78ua4n.apps.googleusercontent.com",
        callback: handleCredential,
        ux_mode: "redirect" // 🔹 КРИТИЧНО: редирект, а не popup
      });
      google.accounts.id.renderButton(
        document.getElementById('g_id_signin'),
        { theme: "outline", size: "large", text: "signin_with", shape: "rectangular" }
      );
    } else {
      document.getElementById('msg').textContent = '❌ Ошибка загрузки Google SDK';
    }
  };
</script>
</body>
</html>
