<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отправка в Telegram</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    input, textarea { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; }
    button { background: #0088cc; color: white; border: none; padding: 12px 24px; cursor: pointer; border-radius: 4px; }
    button:hover { background: #0077b5; }
    #status { margin-top: 20px; padding: 10px; border-radius: 4px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>

  <h2>📤 Отправить данные в Telegram</h2>
  
  <label>Ваше имя:</label>
  <input type="text" id="name" placeholder="Иван">
  
  <label>Сообщение:</label>
  <textarea id="message" rows="4" placeholder="Текст сообщения..."></textarea>
  
  <label>Доп. параметры (JSON, необязательно):</label>
  <textarea id="extra" rows="3" placeholder='{"order_id": 123, "status": "new"}'></textarea>
  
  <button onclick="sendData()">🚀 Отправить</button>
  
  <div id="status"></div>

  <script>
    // 🔥 Замените на ваш опубликованный URL веб-приложения
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwzFEHTTNjaX4jsa_i798Q3fUpw5PzuxZPpm77ubSyR/dev';

    async function sendData() {
      const statusDiv = document.getElementById('status');
      const name = document.getElementById('name').value.trim();
      const message = document.getElementById('message').value.trim();
      const extraRaw = document.getElementById('extra').value.trim();
      
      // Валидация
      if (!name || !message) {
        showStatus('❌ Заполните имя и сообщение', 'error');
        return;
      }

      // Парсим доп. параметры
      let extra = {};
      if (extraRaw) {
        try {
          extra = JSON.parse(extraRaw);
        } catch (e) {
          showStatus('❌ Ошибка в JSON параметров: ' + e.message, 'error');
          return;
        }
      }

      // Формируем payload
      const payload = {
        name: name,
        message: message,
        extra: extra,
        timestamp: new Date().toISOString(),
        userAgent: navigator.userAgent,
        platform: /mobile/i.test(navigator.userAgent) ? 'mobile' : 'desktop'
      };

      showStatus('⏳ Отправка...', '');

      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          credentials: 'include',  // 🔥 Критично для передачи авторизации
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(payload)
        });

        // Google Apps Script может вернуть редирект — обрабатываем
        const result = await response.json().catch(() => ({}));
        
        if (response.ok || result.status === 'ok') {
          showStatus('✅ Сообщение отправлено!', 'success');
          document.getElementById('message').value = ''; // Очистить поле
        } else {
          showStatus('❌ Ошибка: ' + (result.error || response.statusText), 'error');
        }
      } catch (error) {
        showStatus('❌ Сетевая ошибка: ' + error.message, 'error');
        console.error('Fetch error:', error);
      }
    }

    function showStatus(text, className) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = className;
    }
  </script>
</body>
</html>
