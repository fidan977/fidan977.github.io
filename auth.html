<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    
    <!-- 🔹 Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            padding: 20px; 
        }
        .card { 
            background: white; padding: 40px 30px; border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); 
            width: 100%; max-width: 420px; text-align: center; 
        }
        .card h2 { margin-bottom: 25px; color: #333; }
        #g_id_signin { margin: 0 auto; min-height: 40px; }
        .loader { 
            border: 3px solid #f3f3f3; border-top: 3px solid #667eea; 
            border-radius: 50%; width: 28px; height: 28px; 
            animation: spin 1s linear infinite; margin: 20px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { color: #e74c3c; margin-top: 15px; font-size: 14px; min-height: 20px; }
        .success { color: #27ae60; font-weight: 600; margin-bottom: 10px; }
        .hidden { display: none !important; }
        #user-avatar { 
            width: 90px; height: 90px; border-radius: 50%; margin: 15px auto; 
            display: block; border: 3px solid #667eea; object-fit: cover; 
        }
        #user-name { font-size: 18px; font-weight: 600; color: #333; margin: 10px 0 5px; }
        #user-email { color: #666; font-size: 14px; margin-bottom: 20px; word-break: break-all; }
        button { 
            background: #e74c3c; color: white; border: none; padding: 12px 24px; 
            border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; 
            transition: background 0.2s; margin-top: 10px;
        }
        button:hover { background: #c0392b; }
        .footer { margin-top: 25px; font-size: 12px; color: #999; }
        .footer a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>🔐 Вход в систему</h2>
    
    <!-- Секция входа -->
    <div id="login-section">
        <div id="g_id_signin"></div>
        <div class="loader hidden" id="loader"></div>
        <div class="error" id="error-msg"></div>
    </div>

    <!-- Секция успеха -->
    <div id="success-section" class="hidden">
        <p class="success">✓ Доступ разрешён</p>
        <img id="user-avatar" src="" alt="Avatar">
        <div id="user-name"></div>
        <div id="user-email"></div>
        <button onclick="logout()">🚪 Выйти</button>
    </div>
    
    <div class="footer">
        Защищено Google OAuth • 
        <a href="https://fidan977.github.io/" target="_blank">На главную</a>
    </div>
</div>

<script>
    // 🔥 ССЫЛКА НА ВАШ APPS SCRIPT (без пробелов!)
    // ✅ Используйте эту ссылку:
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz17gn2JxsR6IwPCKonUudB9FfrP5fllJms4k0myStaYfws4gB10UHyHSVJyug9HjmkTQ/exec';
    
    // 🔹 Куда перенаправить после успешного входа
    const REDIRECT_AFTER_SUCCESS = 'https://fidan977.github.io/';

    /**
     * Обработчик успешного входа через Google
     */
    function handleGoogleResponse(response) {
        const idToken = response.credential;
        
        // Показываем лоадер
        document.getElementById('loader').classList.remove('hidden');
        document.getElementById('error-msg').textContent = '';
        
        // 🔹 МГНОВЕННЫЙ РЕДИРЕКТ на скрипт через GET-параметры
        // Кодируем токен для безопасной передачи в URL
        const redirectUrl = SCRIPT_URL.trim() + 
            '?action=checkAccess' +
            '&token=' + encodeURIComponent(idToken) +
            '&redirect=' + encodeURIComponent(REDIRECT_AFTER_SUCCESS);
        
        console.log('🔄 Редирект на:', redirectUrl);
        
        // Перенаправляем браузер — POST не нужен!
        window.location.href = redirectUrl;
    }

    /**
     * Показать интерфейс успешного входа
     */
    function showSuccess(user) {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('success-section').classList.remove('hidden');
        
        document.getElementById('user-name').textContent = user.name || user.email;
        document.getElementById('user-email').textContent = user.email;
        document.getElementById('user-avatar').src = user.picture || 'https://via.placeholder.com/90?text=👤';
        
        // Сохраняем сессию в localStorage (24 часа)
        localStorage.setItem('authUser', JSON.stringify({
            email: user.email,
            name: user.name,
            picture: user.picture,
            loginTime: Date.now()
        }));
    }

    /**
     * Выход из системы
     */
    function logout() {
        localStorage.removeItem('authUser');
        if (window.google?.accounts?.id) {
            google.accounts.id.disableAutoSelect();
        }
        location.reload();
    }

    /**
     * Проверка параметров после редиректа от скрипта
     * Вызывается автоматически при загрузке страницы
     */
    function checkRedirectResult() {
        const params = new URLSearchParams(window.location.search);
        const status = params.get('status');
        
        if (status === 'ok') {
            // ✅ Успешная авторизация — показываем данные
            const user = {
                email: params.get('email'),
                name: params.get('name'),
                picture: params.get('picture')
            };
            showSuccess(user);
            
            // Очищаем URL от параметров (опционально)
            if (window.history.replaceState) {
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            return true;
        }
        
        // ❌ Ошибка авторизации
        const error = params.get('error');
        if (error) {
            document.getElementById('loader')?.classList.add('hidden');
            document.getElementById('error-msg').textContent = '❌ Ошибка: ' + error;
            
            // Очищаем параметры из URL
            if (window.history.replaceState) {
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            return true;
        }
        
        return false; // Нет параметров редиректа
    }

    /**
     * Инициализация при загрузке
     */
    window.onload = function() {
        // 🔹 1. Проверяем, не вернулись ли мы после редиректа от скрипта
        if (checkRedirectResult()) {
            return; // Уже обработали результат, не инициализируем кнопку
        }
        
        // 🔹 2. Проверяем сохранённую сессию в localStorage
        const saved = localStorage.getItem('authUser');
        if (saved) {
            try {
                const user = JSON.parse(saved);
                const maxAge = 24 * 60 * 60 * 1000; // 24 часа
                if (Date.now() - user.loginTime < maxAge) {
                    showSuccess(user);
                    return;
                }
            } catch(e) { 
                localStorage.removeItem('authUser'); 
            }
        }
        
        // 🔹 3. Инициализируем кнопку входа через Google
        if (window.google?.accounts?.id) {
            google.accounts.id.initialize({
                client_id: "461200840639-bup0mjs0lji7cr1lbbd49poc2t78ua4n.apps.googleusercontent.com",
                callback: handleGoogleResponse,
                ux_mode: "redirect",      // 🔹 КРИТИЧНО: redirect вместо popup
                auto_select: false
            });
            
            google.accounts.id.renderButton(
                document.getElementById('g_id_signin'),
                { 
                    theme: "outline", 
                    size: "large", 
                    text: "signin_with", 
                    shape: "rectangular" 
                }
            );
        } else {
            console.error('Google Identity Services не загрузился');
            document.getElementById('error-msg').textContent = '❌ Ошибка загрузки Google SDK';
        }
    };
</script>

</body>
</html>
