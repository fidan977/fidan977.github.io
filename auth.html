<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container { 
            background: white; padding: 2rem; border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 380px; 
        }
        h2 { text-align: center; margin-bottom: 1.5rem; color: #333; }
        input { 
            width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #e0e0e0; 
            border-radius: 8px; font-size: 15px; transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; }
        button { 
            width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 8px; font-size: 16px; 
            cursor: pointer; margin-top: 10px; transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .message { margin-top: 12px; text-align: center; font-size: 14px; min-height: 20px; }
        .error { color: #d32f2f; }
        .success { color: #388e3c; }
        .loader {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; 
            border-top-color: white; animation: spin 0.8s linear infinite; 
            margin-right: 8px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Авторизация</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Логин" required autocomplete="username">
            <input type="password" id="password" placeholder="Пароль" required autocomplete="current-password">
            <button type="submit" id="loginBtn">Войти</button>
        </form>
        <div class="message" id="message"></div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyKJCKwghqQad9lWxJSr6lHoyYN_8uqg0fDy5wI3qiaywFm2948hxTXCZhLwCfZRRzY/exec';
        const form = document.getElementById('loginForm');
        const btn = document.getElementById('loginBtn');
        const msg = document.getElementById('message');

        // Проверка существующей сессии при загрузке
        window.addEventListener('load', async () => {
            const saved = localStorage.getItem('authSession');
            if (saved) {
                try {
                    const { token } = JSON.parse(saved);
                    const res = await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: "check", token })
                    });
                    const data = await res.json();
                    if (data.success) window.location.href = 'dashboard.html';
                    else localStorage.removeItem('authSession');
                } catch (e) { localStorage.removeItem('authSession'); }
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span>Проверка...';
            msg.textContent = '';

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "login", username, password })
                });
                const result = await res.json();

                if (result.success) {
                    localStorage.setItem('authSession', JSON.stringify({
                        token: result.token,
                        username: username,
                        role: result.role
                    }));
                    msg.textContent = '✓ Успешно! Переход...';
                    msg.className = 'message success';
                    setTimeout(() => window.location.href = 'dashboard.html', 800);
                } else {
                    msg.textContent = '❌ ' + result.message;
                    msg.className = 'message error';
                }
            } catch (err) {
                msg.textContent = '🌐 Ошибка соединения';
                msg.className = 'message error';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Войти';
            }
        });
    </script>
</body>
</html>
