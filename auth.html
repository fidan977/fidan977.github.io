<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container { 
            background: white; padding: 2rem; border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            width: 100%; max-width: 350px; 
        }
        h2 { text-align: center; margin: 0 0 1.5rem; color: #333; }
        input { 
            width: 100%; padding: 12px; margin: 8px 0; 
            border: 2px solid #e0e0e0; border-radius: 6px; 
            font-size: 14px; transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; }
        button { 
            width: 100%; padding: 12px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 6px; 
            font-size: 16px; cursor: pointer; margin-top: 10px;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .message { margin-top: 12px; text-align: center; font-size: 14px; min-height: 20px; }
        .error { color: #d32f2f; }
        .success { color: #388e3c; }
        .hidden { display: none !important; }
        .loader {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; border-top-color: white;
            animation: spin 0.8s linear infinite; margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <!-- Форма входа -->
        <div id="loginView">
            <h2>🔐 Вход</h2>
            <input type="text" id="username" placeholder="Логин" autocomplete="username">
            <input type="password" id="password" placeholder="Пароль" autocomplete="current-password">
            <button onclick="login()" id="loginBtn">Войти</button>
            <div class="message" id="message"></div>
        </div>

        <!-- Панель после входа -->
        <div id="dashboardView" class="hidden">
            <h2>✅ Вы вошли!</h2>
            <div style="text-align: center; line-height: 1.8;">
                <p>Пользователь: <strong id="userDisplay">—</strong></p>
                <p>Роль: <strong id="roleDisplay">—</strong></p>
            </div>
            <button onclick="logout()" style="background: #f44336; margin-top: 20px;">Выйти</button>
        </div>
    </div>

    <script>
        // 🎯 Ваш URL веб-приложения
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyKJCKwghqQad9lWxJSr6lHoyYN_8uqg0fDy5wI3qiaywFm2948hxTXCZhLwCfZRRzY/exec';

        // Проверка сессии при загрузке страницы
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('authSession');
            if (saved) {
                try {
                    const session = JSON.parse(saved);
                    if (session.token) {
                        checkSession(session.token);
                    }
                } catch(e) {
                    localStorage.removeItem('authSession');
                }
            }
        });

        // 🔐 Функция входа
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('message');

            if (!username || !password) {
                showMessage('⚠️ Введите логин и пароль', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span>Проверка...';
            showMessage('', '');

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action: "login", 
                        username: username, 
                        password: password 
                    })
                });

                const result = await response.json();

                if (result.success) {
                    // Сохраняем токен и данные сессии
                    localStorage.setItem('authSession', JSON.stringify({
                        token: result.token,
                        username: result.username || username,
                        role: result.role
                    }));
                    showDashboard(result);
                    showMessage('✓ Успешно!', 'success');
                } else {
                    showMessage('❌ ' + result.message, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('🌐 Ошибка сети', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Войти';
            }
        }

        // 🔍 Проверка токена на сервере
        async function checkSession(token) {
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action: "check", 
                        token: token 
                    })
                });
                const result = await response.json();

                if (result.success) {
                    showDashboard(result);
                } else {
                    // Токен невалиден — выходим
                    logout();
                }
            } catch (error) {
                console.error('Check error:', error);
                logout();
            }
        }

        // 🚪 Выход
        async function logout() {
            const session = JSON.parse(localStorage.getItem('authSession') || '{}');
            
            // Отправляем запрос на очистку токена в таблице
            if (session.token) {
                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action: "logout", 
                        token: session.token 
                    })
                });
            }
            
            localStorage.removeItem('authSession');
            document.getElementById('dashboardView').classList.add('hidden');
            document.getElementById('loginView').classList.remove('hidden');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            showMessage('', '');
        }

        // Отображение панели
        function showDashboard(data) {
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('dashboardView').classList.remove('hidden');
            document.getElementById('userDisplay').textContent = data.username || '—';
            document.getElementById('roleDisplay').textContent = data.role || '—';
        }

        // Сообщения
        function showMessage(text, type) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = 'message ' + type;
        }

        // Enter в поле пароля
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
