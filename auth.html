<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container { 
            background: white; 
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            width: 100%;
            max-width: 350px; 
        }
        h2 { text-align: center; margin: 0 0 1.5rem; color: #333; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 2px solid #e0e0e0; 
            border-radius: 6px; 
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; }
        button { 
            width: 100%; 
            padding: 12px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s;
            margin-top: 10px;
        }
        button:hover { transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .message { 
            margin-top: 12px; 
            text-align: center; 
            font-size: 14px; 
            min-height: 20px;
        }
        .error { color: #d32f2f; }
        .success { color: #388e3c; }
        .hidden { display: none !important; }
        .dashboard-info { text-align: center; line-height: 1.8; }
        .dashboard-info strong { color: #667eea; }
        .logout-btn { background: #f44336; margin-top: 20px; }
        .logout-btn:hover { background: #d32f2f; }
        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <!-- Форма входа -->
        <div id="loginView">
            <h2>🔐 Вход</h2>
            <input type="text" id="username" placeholder="Логин" autocomplete="username">
            <input type="password" id="password" placeholder="Пароль" autocomplete="current-password">
            <button onclick="login()" id="loginBtn">Войти</button>
            <div class="message" id="message"></div>
        </div>

        <!-- Панель после входа -->
        <div id="dashboardView" class="hidden">
            <h2>✅ Успешно!</h2>
            <div class="dashboard-info">
                <p>Пользователь: <strong id="userDisplay">—</strong></p>
                <p>Роль: <strong id="roleDisplay">—</strong></p>
                <p><small>Токен: <span id="tokenDisplay" style="word-break: break-all;">—</span></small></p>
            </div>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>
    </div>

    <script>
        // 🎯 ВАШ URL веб-приложения Google Apps Script
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyKJCKwghqQad9lWxJSr6lHoyYN_8uqg0fDy5wI3qiaywFm2948hxTXCZhLwCfZRRzY/exec';

        // Проверка сессии при загрузке
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('authSession');
            if (saved) {
                try {
                    const session = JSON.parse(saved);
                    // Опционально: проверить время жизни сессии
                    showDashboard(session);
                } catch(e) {
                    localStorage.removeItem('authSession');
                }
            }
        });

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('message');

            if (!username || !password) {
                showMessage('⚠️ Введите логин и пароль', 'error');
                return;
            }

            // UI: состояние загрузки
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span>Проверка...';
            showMessage('', '');

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    // Google Apps Script принимает JSON в postData.contents
                    body: JSON.stringify({ username, password })
                    // Не указываем Content-Type явно — браузер поставит text/plain,
                    // что позволяет избежать preflight CORS-запроса
                });

                const result = await response.json();

                if (result.success) {
                    const session = {
                        username: result.username || username,
                        role: result.role || 'user',
                        token: result.token,
                        loggedInAt: new Date().toISOString()
                    };
                    localStorage.setItem('authSession', JSON.stringify(session));
                    showDashboard(session);
                    showMessage('✓ Авторизация успешна!', 'success');
                } else {
                    showMessage('❌ ' + (result.message || 'Ошибка авторизации'), 'error');
                }
            } catch (error) {
                console.error('Fetch error:', error);
                showMessage('🌐 Ошибка сети или сервера', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Войти';
            }
        }

        function showDashboard(session) {
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('dashboardView').classList.remove('hidden');
            document.getElementById('userDisplay').textContent = session.username;
            document.getElementById('roleDisplay').textContent = session.role;
            document.getElementById('tokenDisplay').textContent = session.token?.substring(0, 20) + '...';
        }

        function logout() {
            localStorage.removeItem('authSession');
            document.getElementById('dashboardView').classList.add('hidden');
            document.getElementById('loginView').classList.remove('hidden');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('message').textContent = '';
        }

        function showMessage(text, type) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = 'message ' + type;
        }

        // Поддержка Enter в полях ввода
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
