<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 🛡️ CSP: Разрешаем подключения к Google Apps Script -->
    <meta http-equiv="Content-Security-Policy" 
          content="default-src 'self'; 
                   script-src 'self' 'unsafe-inline'; 
                   style-src 'self' 'unsafe-inline'; 
                   img-src 'self' data:; 
                   connect-src 'self' https://script.google.com https://*.googleusercontent.com;">
    
    <title>Личный кабинет</title>
    <style>
        :root { --primary: #4a90e2; --danger: #e74c3c; --success: #27ae60; --bg: #f8f9fa; --card: #ffffff; --text: #333333; --gray: #6c757d; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 20px; min-height: 100vh; }
        .container { max-width: 700px; margin: 0 auto; }
        
        /* Шапка */
        header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 15px 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
        header h1 { font-size: 1.4rem; color: var(--primary); }
        #logoutBtn { background: var(--danger); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        #logoutBtn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Карточки */
        .card { background: var(--card); padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 15px; }
        .card h2 { margin-bottom: 16px; font-size: 1.2rem; color: var(--gray); }
        
        /* Строки информации */
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: var(--gray); }
        .info-value { font-weight: 500; }
        
        /* Бейджи ролей */
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .badge.admin { background: #fff3cd; color: #856404; }
        .badge.user { background: #d1ecf1; color: #0c5460; }

        /* Состояния */
        .loader, .error { text-align: center; padding: 40px; background: var(--card); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .error { color: var(--danger); background: #fdf2f2; border: 1px solid #fecaca; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(74,144,226,0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔐 Личный кабинет</h1>
            <button id="logoutBtn">Выйти</button>
        </header>

        <main id="content">
            <div class="loader">
                <div class="spinner"></div>
                <p>Проверка сессии и загрузка данных...</p>
            </div>
        </main>
    </div>

    <script>
        // 🎯 Ваш URL веб-приложения
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyKJCKwghqQad9lWxJSr6lHoyYN_8uqg0fDy5wI3qiaywFm2948hxTXCZhLwCfZRRzY/exec';

        // 1. Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', async () => {
            const sessionStr = localStorage.getItem('authSession');
            if (!sessionStr) return redirectLogin();

            let session;
            try { session = JSON.parse(sessionStr); } catch { return redirectLogin(); }
            
            if (!session.token || !session.username) return redirectLogin();

            await loadDashboard(session.token, session.username);
        });

        // 2. Запрос данных с сервера (БЕЗ HEADERS для избежания CORS Preflight)
        async function loadDashboard(token, username) {
            const content = document.getElementById('content');
            
            try {
                // ❗ КРИТИЧНО: Никаких headers! Только method и body.
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action: "getDashboard", 
                        token: token, 
                        username: username 
                    })
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                
                const result = await res.json();
                
                if (!result.success) {
                    if (result.redirect) {
                        setTimeout(redirectLogin, 1500);
                        throw new Error('Сессия недействительна');
                    }
                    throw new Error(result.message || 'Ошибка авторизации');
                }

                // ✅ Успех: рендерим интерфейс
                renderDashboard(result);

            } catch (err) {
                console.error('📡 Dashboard Error:', err);
                content.innerHTML = `<div class="error">
                    ❌ ${err.message}<br>
                    <small style="color:#666">F12 → Console/Network для деталей</small>
                </div>`;
            }
        }

        // 3. Безопасный рендеринг (XSS-proof через textContent)
        function renderDashboard(data) {
            const content = document.getElementById('content');
            content.innerHTML = ''; // Очистка спиннера

            const mainCard = document.createElement('div');
            mainCard.className = 'card';
            mainCard.innerHTML = `
                <h2>👋 Добро пожаловать!</h2>
                <div class="info-row">
                    <span class="info-label">Пользователь:</span>
                    <span class="info-value" id="dispUser">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Роль:</span>
                    <span class="info-value" id="dispRole">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Время сервера:</span>
                    <span class="info-value" id="dispTime">—</span>
                </div>
            `;
            content.appendChild(mainCard);

            // 🔒 Безопасная вставка через textContent (никакого innerHTML для пользовательских данных!)
            document.getElementById('dispUser').textContent = data.username || '—';
            document.getElementById('dispTime').textContent = data.serverTime || '—';

            // Рендер роли с бейджем
            const roleContainer = document.getElementById('dispRole');
            const badge = document.createElement('span');
            badge.className = `badge ${data.role === 'admin' ? 'admin' : 'user'}`;
            badge.textContent = data.role === 'admin' ? '👑 Администратор' : '👤 Пользователь';
            roleContainer.innerHTML = '';
            roleContainer.appendChild(badge);
        }

        // 4. Выход
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            const session = JSON.parse(localStorage.getItem('authSession') || '{}');
            if (session.token) {
                fetch(GAS_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: "logout", token: session.token }) 
                }).catch(() => {}); // Игнорируем ошибки сети при выходе
            }
            redirectLogin();
        });

        // 5. Утилита редиректа
        function redirectLogin() {
            localStorage.removeItem('authSession');
            window.location.href = 'auth.html';
        }
    </script>
</body>
</html>
