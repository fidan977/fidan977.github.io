<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure HTML Renderer</title>
    <style>
        /* Стили оформления */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: #1a1a1a; 
            color: #00ff00; 
            padding: 20px; 
            margin: 0;
            line-height: 1.5;
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
        }
        .header {
            text-align: center;
            border-bottom: 1px dashed #00ff00;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .route {
            background: #222;
            padding: 10px;
            border-left: 3px solid #00ff00;
            font-size: 14px;
            margin-bottom: 20px;
        }
        button { 
            background: #00ff00; 
            color: #000; 
            border: none; 
            padding: 15px 30px; 
            font-size: 16px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            border-radius: 4px;
            transition: 0.2s;
        }
        button:hover:not(:disabled) { background: #00cc00; }
        button:disabled { background: #555; color: #888; cursor: not-allowed; }
        
        /* Лог и область контента */
        #log { 
            background: #000; 
            border: 1px solid #333; 
            padding: 15px; 
            margin: 20px 0; 
            min-height: 100px; 
            white-space: pre-wrap; 
            font-size: 13px; 
            color: #888;
        }
        #render-area {
            background: #fff; /* Белый фон для контента, чтобы HTML выглядел нормально */
            color: #333;
            border: 2px solid #00ff00;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
            min-height: 200px;
            display: none; /* Скрыто по умолчанию */
        }
        .success { color: #00ff00; }
        .error { color: #ff5555; }
        .info { color: #55ccff; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1> Secure HTML Channel</h1>
        <p>Загрузка и отрисовка HTML через защищенный туннель</p>
    </div>

    <div class="route">
        <strong>Маршрут:</strong><br>
        GitHub (HTTPS) ➔ GAS (HTTPS) ➔ Beget (HTTP+HMAC)  GAS ➔ GitHub
    </div>

    <button id="btn" onclick="loadSecureHTML()">▶ ЗАГРУЗИТЬ HTML СТРАНИЦУ</button>

    <div id="log">Ожидание команды...</div>

    <!-- Сюда будет вставлен полученный HTML -->
    <div id="render-area"></div>
</div>

<script>
    // ✅ ВСТАВЬТЕ СЮДА ВАШ URL GOOGLE APPS SCRIPT
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyKJCKwghqQad9lWxJSr6lHoyYN_8uqg0fDy5wI3qiaywFm2948hxTXCZhLwCfZRRzY/exec';

    async function loadSecureHTML() {
        const btn = document.getElementById('btn');
        const log = document.getElementById('log');
        const renderArea = document.getElementById('render-area');
        
        btn.disabled = true;
        btn.innerText = '⏳ Загрузка...';
        renderArea.style.display = 'none';
        renderArea.innerHTML = '';
        
        log.innerHTML = '<span class="info">[1/3] Отправка запроса в GAS...</span>\n';

        try {
            // 1. Формируем полезную нагрузку
            const payload = {
                request_type: 'get_html_page',
                user: 'admin',
                timestamp: Date.now()
            };

            // 2. Отправка (ВАЖНО: без заголовка Content-Type, чтобы избежать CORS preflight)
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                throw new Error(`HTTP Error: ${response.status}`);
            }

            const result = await response.json();

            log.innerHTML += '<span class="info">[2/3] Ответ получен. Проверка...</span>\n';

            // 3. Обработка результата
            if (result.status === 'success' && result.data && result.data.html_page) {
                
                log.innerHTML += '<span class="success">[3/3] ✅ HTML успешно получен и подписан!</span>\n';
                
                // Отрисовка HTML
                renderArea.style.display = 'block';
                
                // ВНИМАНИЕ: innerHTML выполняет скрипты внутри полученного HTML.
                // Так как канал защищен HMAC, мы доверяем источнику (нашему серверу).
                renderArea.innerHTML = result.data.html_page;
                
            } else {
                log.innerHTML += `<span class="error">❌ Ошибка: ${result.message || 'Неверный формат данных'}</span>`;
            }

        } catch (e) {
            log.innerHTML += `<span class="error">❌ Сетевая ошибка: ${e.message}</span>`;
        } finally {
            btn.disabled = false;
            btn.innerText = '▶ ЗАГРУЗИТЬ HTML СТРАНИЦУ';
        }
    }
</script>

</body>
</html>
