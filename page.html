<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure App</title>
    <style>
        :root { --primary: #667eea; --bg: #f0f2f5; --card-bg: #fff; --text: #333; --danger: #ef4444; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 20px; min-height: 100vh; }
        .app-container { max-width: 900px; margin: 0 auto; background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; min-height: calc(100vh - 40px); }
        .app-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-bar { display: flex; gap: 8px; padding: 15px; background: #f8fafc; border-bottom: 1px solid var(--border); overflow-x: auto; min-height: 55px; align-items: center; }
        .nav-btn { background: #fff; border: 1px solid var(--border); padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-weight: 500; white-space: nowrap; }
        .nav-btn:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-1px); }
        .nav-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .nav-btn.danger { border-color: #fecaca; color: var(--danger); margin-left: auto; }
        .nav-btn.danger:hover { background: var(--danger); color: white; }
        .content-area { padding: 30px; flex-grow: 1; background: #fff; }
        .status-bar { padding: 10px 20px; background: #f8fafc; border-top: 1px solid var(--border); font-size: 0.9rem; color: #666; display: flex; justify-content: space-between; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #ddd; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="app-container">
    <header class="app-header">
        <h1>🔐 Secure App</h1>
        <span id="sessionInfo" style="font-size:0.8rem; opacity:0.9;">Загрузка...</span>
    </header>
    
    <!-- Сюда вставляем кнопки меню -->
    <nav class="nav-bar" id="navBar">
        <div class="spinner"></div>
    </nav>
    
    <!-- Сюда вставляем контент страницы -->
    <main class="content-area" id="contentArea">
        <div style="text-align:center; padding:40px; color:#666;">
            <div class="spinner" style="width:40px;height:40px;"></div>
            <p style="margin-top:10px;">Инициализация...</p>
        </div>
    </main>
    
    <div class="status-bar">
        <span id="statusText">Готов</span>
        <span id="timestamp"></span>
    </div>
</div>

<script>
    // ⚙️ НАСТРОЙКИ
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyKJCKwghqQad9lWxJSr6lHoyYN_8uqg0fDy5wI3qiaywFm2948hxTXCZhLwCfZRRzY/exec';
    const SESSION_KEY = 'secure_session_token_v1';

    // === ЕДИНАЯ ФУНКЦИЯ ЗАПРОСА К ШЛЮЗУ ===
    async function fetchFromGateway(payload) {
        try {
            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
        } catch (e) {
            console.error('Gateway error:', e);
            throw e;
        }
    }

    // 1. Загрузка МЕНЮ (HTML-кнопки)
    async function loadMenu(activePage) {
        try {
            const result = await fetchFromGateway({ action: 'get_menu_html', active: activePage });
            if (result.status === 'success') {
                document.getElementById('navBar').innerHTML = result.html_menu;
            }
        } catch (e) {
            document.getElementById('navBar').innerHTML = '<span style="color:red;padding:10px;">❌ Ошибка меню</span>';
        }
    }

    // 2. Загрузка КОНТЕНТА (HTML-страница)
    async function loadContent(pageName) {
        const statusBar = document.getElementById('statusText');
        const contentArea = document.getElementById('contentArea');
        const tsEl = document.getElementById('timestamp');
        
        statusBar.innerHTML = '<span class="spinner"></span> Загрузка...';
        tsEl.textContent = new Date().toLocaleTimeString();
        
        try {
            const sessionId = localStorage.getItem(SESSION_KEY);
            
            const result = await fetchFromGateway({ 
                action: 'load_page', 
                endpoint: pageName,
                session_id: sessionId
            });
            
            if (result.status === 'success') {
                // Обновляем сессию
                if (result.data.session_id) {
                    localStorage.setItem(SESSION_KEY, result.data.session_id);
                    document.getElementById('sessionInfo').textContent = 'ID: ' + result.data.session_id.substring(0,8) + '...';
                }
                
                // Вставляем HTML
                contentArea.innerHTML = result.data.html_page;
                statusBar.textContent = `✅ "${pageName}" загружена`;
            } else {
                throw new Error(result.message);
            }
        } catch (e) {
            contentArea.innerHTML = `<div style="text-align:center;color:red;padding:20px;"><h3>⚠️ Ошибка</h3><p>${e.message}</p><button onclick="navigate('${pageName}')" style="margin-top:10px;padding:5px 10px;">Повторить</button></div>`;
            statusBar.textContent = '❌ Ошибка';
        }
    }

    // === ГЛАВНАЯ НАВИГАЦИЯ ===
    async function navigate(pageName) {
        await loadMenu(pageName);   // Сначала обновляем меню (подсветка)
        await loadContent(pageName); // Потом грузим контент
        window.history.replaceState({}, '', `?view=${pageName}`);
    }

    function logout() {
        localStorage.removeItem(SESSION_KEY);
        location.reload();
    }

    // === ЗАПУСК ===
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const page = urlParams.get('view') || 'home';
        navigate(page);
    });

    // Глобальные функции для кнопок
    window.navigate = navigate;
    window.logout = logout;
</script>
</body>
</html>
