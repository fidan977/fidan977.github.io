<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure App</title>
    <style>
        :root { --primary: #667eea; --primary-hover: #556cd6; --bg: #f0f2f5; --card-bg: #fff; --text: #333; --danger: #ef4444; --success: #22c55e; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 20px; min-height: 100vh; }
        .app-container { max-width: 900px; margin: 0 auto; background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; display: flex; flex-direction: column; min-height: calc(100vh - 40px); }
        .app-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .app-header h1 { font-size: 1.5rem; font-weight: 700; }
        .badges { display: flex; gap: 10px; flex-wrap: wrap; }
        .badge { font-size: 0.75rem; background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-family: monospace; }
        .nav-bar { display: flex; gap: 8px; padding: 15px 25px; background: #f8fafc; border-bottom: 1px solid var(--border); overflow-x: auto; flex-wrap: wrap; align-items: center; min-height: 50px; }
        .nav-btn { background: #fff; border: 1px solid var(--border); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; white-space: nowrap; color: var(--text); font-weight: 500; }
        .nav-btn:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-1px); }
        .nav-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .nav-btn.danger { border-color: #fecaca; color: var(--danger); margin-left: auto; }
        .nav-btn.danger:hover { background: var(--danger); color: white; border-color: var(--danger); }
        .content-area { padding: 30px; flex-grow: 1; background: #fff; }
        .content-area h2 { margin-bottom: 20px; color: #1e293b; font-size: 1.8rem; border-bottom: 2px solid var(--primary); padding-bottom: 10px; display: inline-block; }
        .content-area p { margin-bottom: 15px; }
        .content-area code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-family: monospace; color: #d946ef; }
        .content-area pre { background: #1e293b; color: #e2e8f0; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 0.85rem; margin: 15px 0; }
        .status-bar { padding: 12px 25px; background: #f8fafc; border-top: 1px solid var(--border); font-size: 0.9rem; color: #666; display: flex; justify-content: space-between; align-items: center; }
        .status-text.success { color: var(--success); font-weight: 600; }
        .status-text.error { color: var(--danger); font-weight: 600; }
        .status-text.loading { color: var(--primary); font-weight: 600; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.1); border-left-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .mt-4 { margin-top: 1.5rem; }
        @media (max-width: 600px) { body { padding: 10px; } .app-header { flex-direction: column; text-align: center; } .nav-btn.danger { margin-left: 0; width: 100%; margin-top: 5px; } }
    </style>
</head>
<body>
<div class="app-container">
    <header class="app-header">
        <h1>🔐 Secure App</h1>
        <div class="badges">
            <span class="badge" id="sessionBadge">Сессия: —</span>
            <span class="badge" id="endpointBadge">Страница: —</span>
        </div>
    </header>
    
    <!-- Сюда будем вставлять готовые кнопки из get_templates -->
    <nav class="nav-bar" id="navBar">
        <div class="spinner"></div> Загрузка меню...
    </nav>
    
    <!-- Сюда будем вставлять контент страницы -->
    <main class="content-area" id="contentArea">
        <div class="text-center" style="color:#666;padding:40px;">
            <div class="spinner" style="width:40px;height:40px;border-width:4px;"></div>
            <p class="mt-4">Загрузка контента...</p>
        </div>
    </main>
    
    <div class="status-bar">
        <span id="statusText" class="status-text">Инициализация...</span>
        <span id="timestamp" style="font-size:0.8rem;color:#94a3b8;"></span>
    </div>
</div>

<script>
    // ========================================================================
    // ⚙️ НАСТРОЙКИ
    // ========================================================================
    const GAS_GATEWAY_URL = 'https://script.google.com/macros/s/AKfycbyKJCKwghqQad9lWxJSr6lHoyYN_8uqg0fDy5wI3qiaywFm2948hxTXCZhLwCfZRRzY/exec';
    const SESSION_STORAGE_KEY = 'secure_session_token_v1';

    // ========================================================================
    // 🧠 ЯДРО: ЗАПРОСЫ ЧЕРЕЗ GAS
    // ========================================================================

    // Универсальный POST-запрос к GAS
    async function sendGatewayRequest(payload) {
        try {
            const response = await fetch(GAS_GATEWAY_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.json();
        } catch (e) {
            console.error('Gateway error:', e);
            throw e;
        }
    }

    // 1. Загрузка МЕНЮ (получаем готовые HTML-кнопки)
    async function fetchMenuHtml(activePage = 'home') {
        const result = await sendGatewayRequest({
            action: 'get_menu_html',
            active: activePage
        });
        
        if (result.status === 'success' && result.html_menu) {
            return result.html_menu;
        }
        throw new Error(result.message || 'Не удалось загрузить меню');
    }

    // 2. Загрузка КОНТЕНТА страницы (получаем подписанный HTML)
    async function fetchPageHtml(endpointName) {
        const sessionId = localStorage.getItem(SESSION_STORAGE_KEY);
        
        const result = await sendGatewayRequest({
            action: 'load_page',
            endpoint: endpointName,
            session_id: sessionId
        });
        
        if (result.status === 'success' && result.data?.html_page) {
            // Если сервер прислал новый session_id — сохраняем
            if (result.data.session_id) {
                localStorage.setItem(SESSION_STORAGE_KEY, result.data.session_id);
            }
            return result.data.html_page;
        }
        throw new Error(result.message || 'Не удалось загрузить страницу');
    }

    // ========================================================================
    // 🎨 ОТРИСОВКА ИНТЕРФЕЙСА
    // ========================================================================

    // Отрисовка меню (вставляем готовый HTML)
    async function renderMenu(activePage = 'home') {
        const navBar = document.getElementById('navBar');
        try {
            const htmlButtons = await fetchMenuHtml(activePage);
            navBar.innerHTML = htmlButtons;
            return true;
        } catch (error) {
            console.error('Menu error:', error);
            navBar.innerHTML = `<span style="color:#ef4444;padding:10px;">❌ Ошибка меню</span>`;
            return false;
        }
    }

    // Отрисовка контента страницы
    async function renderPage(endpointName) {
        const statusText = document.getElementById('statusText');
        const timestampEl = document.getElementById('timestamp');
        const contentArea = document.getElementById('contentArea');
        const endpointBadge = document.getElementById('endpointBadge');
        
        statusText.className = 'status-text loading';
        statusText.innerHTML = '<span class="spinner"></span> Загрузка...';
        timestampEl.textContent = new Date().toLocaleTimeString();
        endpointBadge.textContent = `Страница: ${endpointName}`;
        
        // Подсветка активной кнопки в меню
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.toggle('active', btn.textContent.trim().toLowerCase() === endpointName);
        });

        try {
            const htmlContent = await fetchPageHtml(endpointName);
            
            statusText.className = 'status-text success';
            statusText.textContent = `✅ "${endpointName}" загружен`;
            contentArea.innerHTML = htmlContent;
            
            // Инициализация кнопок внутри контента (если есть)
            initContentButtons();
            return true;
            
        } catch (error) {
            statusText.className = 'status-text error';
            statusText.textContent = `❌ ${error.message}`;
            contentArea.innerHTML = `
                <div class="text-center" style="padding:40px;color:#ef4444;">
                    <h3>⚠️ Ошибка загрузки</h3>
                    <p><small>${error.message}</small></p>
                    <button onclick="loadPage('${endpointName}')" style="margin-top:15px;background:#ef4444;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;">🔄 Повторить</button>
                </div>
            `;
            return false;
        }
    }

    // Инициализация кнопок внутри загруженного контента
    function initContentButtons() {
        document.querySelectorAll('[data-action]').forEach(btn => {
            btn.onclick = function(e) {
                e.preventDefault();
                const target = this.dataset.template || this.dataset.endpoint || this.dataset.action;
                loadPage(target, this.dataset.params ? JSON.parse(this.dataset.params) : {});
            };
        });
    }

    // ========================================================================
    // 🧭 НАВИГАЦИЯ
    // ========================================================================

    // Главная функция: загружает меню + страницу
    async function loadPage(endpointName, extraParams = {}) {
        // 1. Сначала обновляем меню (чтобы подсветить активную кнопку)
        await renderMenu(endpointName);
        
        // 2. Затем загружаем контент
        await renderPage(endpointName);
        
        // 3. Обновляем URL для истории браузера
        const newUrl = `${window.location.pathname}?view=${endpointName}`;
        window.history.replaceState({page: endpointName}, '', newUrl);
    }

    // Выход из системы
    function logout() {
        localStorage.removeItem(SESSION_STORAGE_KEY);
        document.getElementById('sessionBadge').textContent = 'Сессия: —';
        document.getElementById('statusText').className = 'status-text success';
        document.getElementById('statusText').textContent = '👋 Вы вышли';
        document.getElementById('contentArea').innerHTML = `
            <div class="text-center" style="padding:40px;">
                <h2 style="border:none;">Сеанс завершён</h2>
                <p class="mt-4">Нажмите любую кнопку в меню для входа.</p>
            </div>
        `;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    }

    // Обновление бейджа сессии
    function updateSessionBadge() {
        const badge = document.getElementById('sessionBadge');
        const sessionId = localStorage.getItem(SESSION_STORAGE_KEY);
        if (sessionId) {
            const shortId = sessionId.substring(0, 8) + '...';
            badge.textContent = `ID: ${shortId}`;
        } else {
            badge.textContent = 'Сессия: —';
        }
    }

    // ========================================================================
    // 🚀 ИНИЦИАЛИЗАЦИЯ
    // ========================================================================
    document.addEventListener('DOMContentLoaded', async () => {
        // 1. Проверяем сессию
        updateSessionBadge();
        
        // 2. Читаем ?view=... из URL
        const urlParams = new URLSearchParams(window.location.search);
        const initialPage = urlParams.get('view') || 'home';
        
        // 3. Загружаем меню и страницу
        await loadPage(initialPage);
        
        // Обработка кнопки "Назад" в браузере
        window.onpopstate = function(event) {
            if (event.state?.page) {
                loadPage(event.state.page);
            }
        };
    });

    // ========================================================================
    // 🌐 ГЛОБАЛЬНЫЕ ФУНКЦИИ (для использования в шаблонах)
    // ========================================================================
    window.loadPage = loadPage;
    window.logout = logout;
    window.appAction = function(template, params = {}) {
        loadPage(template, params);
    };
</script>
</body>
</html>
