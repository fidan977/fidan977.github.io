<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure App</title>
    <style>
        /* === БАЗОВЫЕ СТИЛИ === */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .app-container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* === ШАПКА === */
        .app-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .app-header h1 { font-size: 1.4rem; font-weight: 600; }
        .session-badge {
            font-size: 0.75rem;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-family: monospace;
        }
        .endpoint-badge {
            font-size: 0.75rem;
            background: rgba(255,255,255,0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-family: monospace;
        }

        /* === НАВИГАЦИЯ === */
        .nav-bar {
            display: flex;
            gap: 8px;
            padding: 15px 25px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
            overflow-x: auto;
            flex-wrap: wrap;
        }
        .nav-btn {
            background: #fff;
            border: 1px solid #ddd;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .nav-btn:hover, .nav-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .nav-btn.danger {
            border-color: #dc3545;
            color: #dc3545;
        }
        .nav-btn.danger:hover {
            background: #dc3545;
            color: white;
        }

        /* === КОНТЕНТ === */
        .content-area {
            padding: 25px;
            min-height: 400px;
        }
        .content-area h2 {
            margin-bottom: 15px;
            color: #2d3748;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
            display: inline-block;
        }
        .content-area p { margin: 10px 0; }
        .content-area code {
            background: #f1f5f9;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
            color: #c72e53;
        }
        .content-area pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 0.85rem;
            margin: 10px 0;
        }

        /* === СТАТУС И УВЕДОМЛЕНИЯ === */
        .status-bar {
            padding: 12px 25px;
            background: #f8f9fa;
            border-top: 1px solid #eee;
            font-size: 0.9rem;
            color: #666;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .status-bar .success { color: #22c55e; font-weight: 500; }
        .status-bar .error { color: #ef4444; font-weight: 500; }
        .status-bar .loading { color: #667eea; }
        .status-bar .info { color: #3b82f6; }

        /* === КНОПКИ ВНУТРИ КОНТЕНТА === */
        .content-area button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px 5px 5px 0;
            font-size: 0.95rem;
            transition: background 0.2s;
        }
        .content-area button:hover { background: #556cd6; }
        .content-area button.secondary {
            background: #64748b;
        }
        .content-area button.secondary:hover {
            background: #475569;
        }
        .content-area button.outline {
            background: transparent;
            border: 1px solid #667eea;
            color: #667eea;
        }
        .content-area button.outline:hover {
            background: #667eea;
            color: white;
        }

        /* === АДАПТИВНОСТЬ === */
        @media (max-width: 600px) {
            .app-header { flex-direction: column; text-align: center; }
            .nav-bar { padding: 10px 15px; }
            .nav-btn { padding: 6px 12px; font-size: 0.85rem; }
            .content-area { padding: 20px; }
            .status-bar { flex-direction: column; align-items: flex-start; }
        }

        /* === СКРЫТЫЕ ЭЛЕМЕНТЫ === */
        .hidden { display: none !important; }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* === УТИЛИТЫ === */
        .text-center { text-align: center; }
        .mt-2 { margin-top: 1rem; }
        .mb-2 { margin-bottom: 1rem; }
        .flex { display: flex; gap: 10px; align-items: center; }
        .flex-wrap { flex-wrap: wrap; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Шапка -->
    <header class="app-header">
        <h1>🔐 Secure App</h1>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <span class="session-badge" id="sessionBadge">Сессия: —</span>
            <span class="endpoint-badge" id="endpointBadge">Endpoint: —</span>
        </div>
    </header>

    <!-- Навигация -->
    <nav class="nav-bar" id="navBar">
        <button class="nav-btn active" data-endpoint="home" onclick="navigate('home')">🏠 Главная</button>
        <button class="nav-btn" data-endpoint="profile" onclick="navigate('profile')">👤 Профиль</button>
        <button class="nav-btn" data-endpoint="list" onclick="navigate('list')">📋 Список</button>
        <button class="nav-btn" data-endpoint="stats" onclick="navigate('stats')">📊 Статистика</button>
        <button class="nav-btn" data-endpoint="settings" onclick="navigate('settings')">⚙️ Настройки</button>
        <button class="nav-btn danger" onclick="logout()">🚪 Выйти</button>
    </nav>

    <!-- Область контента -->
    <main class="content-area" id="contentArea">
        <div class="text-center" style="color:#666;padding:40px;">
            <div class="spinner"></div>
            <p class="mt-2">Загрузка...</p>
        </div>
    </main>

    <!-- Статус бар -->
    <div class="status-bar" id="statusBar">
        <span id="statusText">Готов к работе</span>
        <span id="timestamp" style="font-size:0.8rem;color:#999;"></span>
    </div>
</div>

<script>
    // ========================================================================
    // ⚙️ НАСТРОЙКИ (ОБЯЗАТЕЛЬНО ЗАПОЛНИТЕ!)
    // ========================================================================
    
    // 🔗 ВСТАВЬТЕ СЮДА ВАШ АКТУАЛЬНЫЙ URL WEB APP ИЗ GOOGLE APPS SCRIPT
    const GAS_GATEWAY_URL = 'https://script.google.com/macros/s/AKfycbyKJCKwghqQad9lWxJSr6lHoyYN_8uqg0fDy5wI3qiaywFm2948hxTXCZhLwCfZRRzY/exec';
    
    // 🔗 БАЗОВЫЙ ПУТЬ К ВАШЕМУ РОУТЕРУ НА BEGET
    // GAS будет подставлять endpoint в конец этого пути
    const PHP_BASE_PATH = '/gate/base';
    
    // Ключ для localStorage
    const SESSION_STORAGE_KEY = 'secure_session_token_v1';

    // ========================================================================
    // 🧠 ЯДРО ПРИЛОЖЕНИЯ
    // ========================================================================

    /**
     * Основная функция отправки запроса на защищённый шлюз
     * @param {string} templateName - Имя шаблона/эндпоинта (home, profile, list...)
     * @param {object} extraParams - Дополнительные параметры для запроса
     */
    async function sendRequest(templateName, extraParams = {}) {
        const statusBar = document.getElementById('statusBar');
        const statusText = document.getElementById('statusText');
        const timestampEl = document.getElementById('timestamp');
        const contentArea = document.getElementById('contentArea');
        const endpointBadge = document.getElementById('endpointBadge');
        
        // Обновляем UI
        statusText.innerHTML = '<span class="loading">⏳ Загрузка...</span>';
        timestampEl.textContent = new Date().toLocaleTimeString();
        endpointBadge.textContent = `Endpoint: ${PHP_BASE_PATH}/${templateName}`;
        
        // Получаем текущий session_id
        const sessionId = localStorage.getItem(SESSION_STORAGE_KEY);
        
        // Формируем пакет данных
        const payload = {
            session_id: sessionId,
            template: templateName,      // Для внутренней логики шаблона
            endpoint: templateName,      // 🔑 Какой эндпоинт вызвать на сервере
            timestamp: Date.now(),
            user_agent: navigator.userAgent.substring(0, 100),
            ...extraParams
        };
        
        try {
            // 🔑 ОТПРАВКА ЗАПРОСА (без заголовков Content-Type для обхода CORS в GAS)
            const response = await fetch(GAS_GATEWAY_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
                // Важно: не указываем headers, чтобы браузер не слал OPTIONS preflight
            });
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            
            const result = await response.json();
            
            // Обработка ответа
            if (result.status === 'success') {
                // Обновляем сессию, если сервер прислал новую
                if (result.data.session_id) {
                    localStorage.setItem(SESSION_STORAGE_KEY, result.data.session_id);
                    updateSessionBadge(result.data.session_id, result.data.is_new_session);
                }
                
                statusText.innerHTML = `<span class="success">✅ "${result.data.template_loaded}" загружен</span>`;
                
                // Вставляем полученный HTML
                if (result.data.html_page) {
                    contentArea.innerHTML = result.data.html_page;
                    
                    // Инициализируем кнопки внутри загруженного контента
                    initContentButtons();
                }
                
                // Если есть доп. данные — логируем в консоль
                if (result.data.extra) {
                    console.log('Extra data:', result.data.extra);
                }
                
                return true;
            } else {
                statusText.innerHTML = `<span class="error">❌ Ошибка: ${result.message}</span>`;
                contentArea.innerHTML = `
                    <div style="text-align:center;color:#ef4444;padding:20px;">
                        <h3>⚠️ Не удалось загрузить контент</h3>
                        <p><small>${result.message || 'Неизвестная ошибка'}</small></p>
                        ${result.message?.toLowerCase().includes('session') || result.message?.toLowerCase().includes('expired') 
                            ? '<button onclick="logout()" style="margin-top:10px;">🔄 Начать новую сессию</button>' 
                            : ''}
                    </div>
                `;
                return false;
            }
            
        } catch (error) {
            console.error('Request failed:', error);
            statusText.innerHTML = `<span class="error">❌ Сетевая ошибка</span>`;
            contentArea.innerHTML = `
                <div style="text-align:center;color:#ef4444;padding:20px;">
                    <h3>🌐 Ошибка соединения</h3>
                    <p><small>Не удалось соединиться с сервером.<br>Проверьте интернет или URL шлюза.</small></p>
                    <button onclick="sendRequest('${templateName}')" style="margin-top:10px;">🔄 Повторить</button>
                </div>
            `;
            return false;
        }
    }

    /**
     * Навигация между шаблонами/эндпоинтами
     */
    function navigate(endpointName) {
        // Обновляем активную кнопку в меню
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.endpoint === endpointName) {
                btn.classList.add('active');
            }
        });
        
        // Загружаем шаблон
        sendRequest(endpointName);
        
        // Обновляем URL без перезагрузки страницы (для красоты и истории)
        const newUrl = `${window.location.pathname}?view=${endpointName}`;
        window.history.replaceState({endpoint: endpointName}, '', newUrl);
    }

    /**
     * Выход из системы (сброс сессии)
     */
    function logout() {
        localStorage.removeItem(SESSION_STORAGE_KEY);
        updateSessionBadge(null, false);
        document.getElementById('endpointBadge').textContent = 'Endpoint: —';
        document.getElementById('statusText').innerHTML = '<span class="success">👋 Вы вышли из системы</span>';
        document.getElementById('contentArea').innerHTML = `
            <div style="text-align:center;padding:40px;">
                <h2 style="border:none;color:#2d3748;">Вы успешно вышли</h2>
                <p class="mt-2">Нажмите "Главная", чтобы начать новую сессию.</p>
                <br>
                <button onclick="navigate('home')" style="background:#22c55e;">🏠 На главную</button>
            </div>
        `;
    }

    /**
     * Обновление бейджа сессии в шапке
     */
    function updateSessionBadge(sessionId, isNew) {
        const badge = document.getElementById('sessionBadge');
        if (sessionId) {
            const shortId = sessionId.substring(0, 8) + '...';
            const status = isNew ? '✨ новая' : '● активна';
            badge.textContent = `ID: ${shortId} (${status})`;
        } else {
            badge.textContent = 'Сессия: —';
        }
    }

    /**
     * Инициализация кнопок внутри динамически загруженного контента
     * Поддерживает: <button data-action="load" data-template="profile">
     */
    function initContentButtons() {
        // Кнопки с data-action
        document.querySelectorAll('[data-action]').forEach(btn => {
            btn.onclick = function(e) {
                e.preventDefault();
                const action = this.dataset.action;
                const template = this.dataset.template || action;
                const endpoint = this.dataset.endpoint || template;
                const params = this.dataset.params ? JSON.parse(this.dataset.params) : {};
                sendRequest(endpoint, params);
            };
        });
        
        // Кнопки с onclick="appNavigate(...)"
        document.querySelectorAll('[onclick*="appNavigate"]').forEach(btn => {
            // Уже обработано через глобальную функцию
        });
    }

    // ========================================================================
    // 🚀 ИНИЦИАЛИЗАЦИЯ ПРИ ЗАГРУЗКЕ СТРАНИЦЫ
    // ========================================================================
    
    document.addEventListener('DOMContentLoaded', () => {
        // 1. Показываем текущую сессию
        const savedSession = localStorage.getItem(SESSION_STORAGE_KEY);
        updateSessionBadge(savedSession, false);
        
        // 2. Читаем параметр ?view=... из URL
        const urlParams = new URLSearchParams(window.location.search);
        const initialView = urlParams.get('view') || 'home';
        
        // 3. Обновляем активную кнопку в меню (если есть)
        const navBtn = document.querySelector(`.nav-btn[data-endpoint="${initialView}"]`);
        if (navBtn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            navBtn.classList.add('active');
        }
        
        // 4. Загружаем первый шаблон с небольшой задержкой
        setTimeout(() => {
            navigate(initialView);
        }, 100);
        
        // 5. Обработка кнопки "Назад" в браузере
        window.onpopstate = function(event) {
            if (event.state?.endpoint) {
                navigate(event.state.endpoint);
            }
        };
    });

    // ========================================================================
    // 🛠️ ГЛОБАЛЬНЫЕ ФУНКЦИИ ДЛЯ ВАШИХ ШАБЛОНОВ (PHP)
    // Доступны внутри включаемых файлов через window.имя_функции
    // ========================================================================
    
    window.appNavigate = navigate;
    window.appLogout = logout;
    window.appSendRequest = sendRequest;
    
    /**
     * Удобная обёртка для отправки действия с параметрами
     * Пример использования в PHP:
     * <button onclick="appAction('profile', {user_id: 123})">Профиль</button>
     */
    window.appAction = function(endpoint, params = {}) {
        sendRequest(endpoint, params);
    };
    
    /**
     * Показать уведомление в статус-баре
     */
    window.appNotify = function(message, type = 'info') {
        const statusText = document.getElementById('statusText');
        const classes = {
            'success': 'success',
            'error': 'error', 
            'info': 'info',
            'loading': 'loading'
        };
        statusText.innerHTML = `<span class="${classes[type] || 'info'}">${message}</span>`;
    };
    
    /**
     * Получить текущий session_id
     */
    window.appGetSessionId = function() {
        return localStorage.getItem(SESSION_STORAGE_KEY);
    };
</script>

</body>
</html>
